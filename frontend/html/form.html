<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../styles/form.css">
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <form action="">
        <div class="form-wrapper">
            <div class="form-main">
                <div id="notebook-container">
                    <div id="tabs">
                        <div id="tab-red" class="tab" data-color="red"></div>
                        <div id="tab-purple" class="tab" data-color="purple"></div>
                        <div id="tab-blue" class="tab" data-color="blue"></div>
                        <div id="tab-green" class="tab" data-color="green"></div>
                        <div id="tab-yellow" class="tab" data-color="yellow"></div>
                        <div id="tab-pink" class="tab" data-color="pink"></div>
                    </div>

                    <div id="notebook">
                        <div id="sign"></div>
                        <input id="username-input" type="text" placeholder="Username..." maxlength="25" required autocomplete="off">
                        <!-- <div id="submit-button" type="submit"></div> -->
                        <button id="submit-button" type="submit"></button>
                    </div>
                </div>
            </div>
        </div>
    </form>
    
<script src="../js/form.js"></script>
<script src="../js/style.js"></script>
</body>
</html>
